<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rifa Online - GilSigns</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script defer src="script.js"></script>

</head>

<body>

<header>

<div class="logo">
<img src="img/logo.png" alt="GilSigns">
</div>

<h1>🎟 Rifa Online</h1>

<p>Escolha seu número e concorra!</p>

</header>

<section class="informacoes">

<div class="card">

<h2>🏆 Prêmio</h2>

<p id="premio">
Smartphone Samsung Galaxy
</p>

</div>

<div class="card">

<h2>💰 Valor</h2>

<p id="valor">
R$ 10,00
</p>

</div>

<div class="card">

<h2>📅 Sorteio</h2>

<p id="data">
20/08/2026
</p>

</div>

</section>

<section>

<h2>Escolha seu número</h2>

<div id="numeros" class="numeros"></div>

</section>

<section class="dados">

<h2>Dados do comprador</h2>

<input type="text" id="nome" placeholder="Nome completo">

<input type="tel" id="telefone" placeholder="Telefone">

<input type="text" id="cidade" placeholder="Cidade">

<button onclick="reservarNumero()">
Reservar Número
</button>

</section>

<footer>

<p>© GilSigns - Sistema de Rifas</p>

</footer>

</body>
</html>
